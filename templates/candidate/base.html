<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Candidate Portal{% endblock %} | ATS Lite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981; --primary-dark: #059669; --primary-light: #34d399;
            --accent: #3b82f6;
            --bg: #0f0f1a; --bg-card: #16162a; --bg-input: #1e1e35;
            --border: #2a2a45; --text: #e2e8f0; --text-muted: #94a3b8; --text-dim: #64748b;
            --gradient: linear-gradient(135deg, #10b981, #3b82f6);
            --radius: 12px;
            --secondary: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-logo { padding: 28px 24px; border-bottom: 1px solid var(--border); }
        .sidebar-logo h1 { font-size: 20px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sidebar-logo span { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
        .candidate-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.2); border-radius: 99px; padding: 3px 10px; font-size: 10px; font-weight: 600; color: var(--primary-light); margin-top: 8px; }
        .sidebar-nav { flex: 1; padding: 20px 12px; overflow-y: auto; }
        .nav-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); padding: 0 12px; margin: 16px 0 8px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 500; transition: all 0.2s; margin-bottom: 2px; position: relative; }
        .nav-link:hover { background: rgba(16,185,129,0.08); color: var(--text); }
        .nav-link.active { background: rgba(16,185,129,0.12); color: var(--primary-light); }
        .nav-link.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 60%; background: var(--primary); border-radius: 0 4px 4px 0; }
        .nav-link i { width: 18px; text-align: center; font-size: 15px; }
        .sidebar-user { padding: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 38px; height: 38px; border-radius: 10px; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: white; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 11px; color: var(--primary-light); }
        .logout-btn { color: var(--text-dim); text-decoration: none; font-size: 16px; transition: color 0.2s; }
        .logout-btn:hover { color: var(--danger); }

        /* Main */
        .main-content { margin-left: 260px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
        .topbar { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .topbar-title { font-size: 20px; font-weight: 700; }
        .topbar-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
        .topbar-actions { display: flex; align-items: center; gap: 12px; }
        .page-content { padding: 32px; flex: 1; }

        /* Cards */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: 700; }
        .card-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s, transform 0.2s; }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .stat-icon.green { background: rgba(16,185,129,0.15); color: var(--primary-light); }
        .stat-icon.blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .stat-icon.orange { background: rgba(245,158,11,0.15); color: var(--warning); }
        .stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); padding: 12px 16px; border-bottom: 1px solid var(--border); }
        tbody tr { border-bottom: 1px solid rgba(42,42,69,0.5); transition: background 0.15s; }
        tbody tr:hover { background: rgba(16,185,129,0.04); }
        tbody td { padding: 14px 16px; font-size: 14px; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--gradient); color: white; box-shadow: 0 4px 15px rgba(16,185,129,0.25); }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary-light); }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }

        /* Badges */
        .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-open { background: rgba(16,185,129,0.15); color: var(--secondary); }
        .badge-closed { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-pending { background: rgba(16,185,129,0.15); color: var(--primary-light); }
        .badge-shortlisted { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .badge-rejected { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-hired { background: rgba(245,158,11,0.15); color: var(--warning); }
        .badge-skill { background: rgba(16,185,129,0.1); color: var(--primary-light); border: 1px solid rgba(16,185,129,0.2); margin: 2px; font-size: 11px; padding: 2px 8px; }

        /* Score bar */
        .score-bar { display: flex; align-items: center; gap: 10px; }
        .score-track { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; min-width: 80px; }
        .score-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
        .score-fill.high { background: var(--secondary); }
        .score-fill.mid { background: var(--warning); }
        .score-fill.low { background: var(--danger); }
        .score-text { font-size: 13px; font-weight: 700; min-width: 42px; }

        /* Job card grid */
        .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .job-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: border-color 0.2s, transform 0.2s; }
        .job-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .job-card-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .job-card-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
        .job-card-skills { margin-bottom: 14px; }
        .job-card-actions { display: flex; gap: 8px; }

        /* Filters */
        .filters-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
        .filters-bar .form-control { width: auto; }
        .form-control { padding: 10px 13px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
        .form-control:focus { outline: none; border-color: var(--primary); }

        /* Empty state */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        .already-applied { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--primary-light); font-weight: 600; padding: 6px 12px; background: rgba(16,185,129,0.1); border-radius: 7px; border: 1px solid rgba(16,185,129,0.2); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="sidebar">
    <div class="sidebar-logo">
        <h1><i class="fas fa-layer-group"></i> ATS Lite</h1>
        <span>Vimansh Technologies</span>
        <div class="candidate-badge"><i class="fas fa-user-tie"></i> Candidate Portal</div>
    </div>
    <div class="sidebar-nav">
        <div class="nav-section-title">My Portal</div>
        <a href="{% url 'candidate-portal-dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'candidate-portal-dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="{% url 'candidate-portal-jobs' %}" class="nav-link {% if request.resolver_match.url_name == 'candidate-portal-jobs' %}active{% endif %}">
            <i class="fas fa-briefcase"></i> Browse Jobs
        </a>
        <a href="{% url 'candidate-portal-applications' %}" class="nav-link {% if request.resolver_match.url_name == 'candidate-portal-applications' %}active{% endif %}">
            <i class="fas fa-file-alt"></i> My Applications
        </a>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar">{{ user.username|first|upper }}</div>
        <div class="user-info">
            <div class="user-name">{{ user.username }}</div>
            <div class="user-role">Candidate</div>
        </div>
        <a href="{% url 'logout' %}" class="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></a>
    </div>
</nav>

<div class="main-content">
    {% block content %}{% endblock %}
</div>
{% block extra_js %}{% endblock %}
</body>
</html>
