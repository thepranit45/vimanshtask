<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ATS Lite - Vimansh Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1; --bg: #0f0f1a; --bg-card: #16162a;
            --bg-input: #1e1e35; --border: #2a2a45; --text: #e2e8f0;
            --text-muted: #94a3b8; --gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        body::before { content: ''; position: absolute; width: 500px; height: 500px; background: #6366f1; border-radius: 50%; filter: blur(90px); opacity: 0.12; top: -120px; right: -100px; }
        .container { width: 100%; max-width: 440px; padding: 20px; position: relative; z-index: 10; }
        .brand { text-align: center; margin-bottom: 28px; }
        .brand-icon { width: 56px; height: 56px; background: var(--gradient); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; margin: 0 auto 12px; box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .brand h1 { font-size: 24px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
        .input-wrap { position: relative; }
        .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
        .form-control { width: 100%; padding: 11px 13px 11px 38px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
        .form-control:focus { outline: none; border-color: var(--primary); }
        .form-control::placeholder { color: #475569; }
        .btn-submit { width: 100%; padding: 12px; background: var(--gradient); border: none; border-radius: 9px; color: white; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; margin-top: 6px; }
        .btn-submit:hover { opacity: 0.9; }
        .login-link { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 20px; }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .alert { padding: 11px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; }
        .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-layer-group"></i></div>
        <h1>ATS Lite</h1>
    </div>
    <div class="card">
        <h2 class="card-title">Create Account</h2>
        <p class="card-sub">Join as a recruiter on ATS Lite</p>
        {% for message in messages %}
        <div class="alert alert-error"><i class="fas fa-circle-exclamation"></i> {{ message }}</div>
        {% endfor %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-wrap">
                    <i class="fas fa-shield-halved input-icon"></i>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Create Account</button>
        </form>
        <div class="login-link">Already have an account? <a href="{% url 'login' %}">Sign in</a></div>
    </div>
</div>
</body>
</html>
