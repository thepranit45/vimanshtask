<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted | ATS Lite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f0f1a; --bg-card: #16162a; --border: #2a2a45; --text: #e2e8f0; --gradient: linear-gradient(135deg, #6366f1, #8b5cf6); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .success-container { max-width: 480px; }
        .icon { width: 80px; height: 80px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 24px; box-shadow: 0 8px 32px rgba(16,185,129,0.3); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
        p { color: #94a3b8; font-size: 15px; line-height: 1.6; }
        .job-name { color: var(--primary); font-weight: 600; }
        .check-inbox { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 12px; padding: 20px; margin: 24px 0; }
        .check-inbox i { color: var(--primary); margin-right: 8px; }
    </style>
</head>
<body>
<div class="success-container">
    <div class="icon">✓</div>
    <h1>Application Submitted! 🎉</h1>
    <p>Your application for <span class="job-name">{{ job.title }}</span> has been received successfully.</p>
    <div class="check-inbox">
        <p><i class="fas fa-info-circle"></i> The recruiter will review your profile and reach out if you're shortlisted.</p>
    </div>
    {% for message in messages %}
    <p style="color:#a5b4fc;font-weight:600;font-size:16px">{{ message }}</p>
    {% endfor %}
</div>
</body>
</html>
